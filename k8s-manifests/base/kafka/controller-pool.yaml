apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: superapp-controller-knp-dev
  labels:
    strimzi.io/cluster: superapp-cluster-dev
spec:
  replicas: 1
  roles:
    - controller
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 200m
  jvmOptions:
    -Xms: 128m
    -Xmx: 256m
  storage:
    type: persistent-claim
    size: 1Gi
    deleteClaim: true